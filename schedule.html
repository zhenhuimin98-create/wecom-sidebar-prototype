        /* ====== Teacher search dropdown ====== */
        function getTeacherOptions() {
            return Object.entries(teacherData).map(([key, t]) => ({
                key,
                label: `GTH-${t.name}/${t.id}`,
                name: t.name,
                id: t.id
            }));
        }

        function showTeacherDropdown() {
            filterTeacherDropdown();
            document.getElementById('teacherDropdown').classList.add('show');
        }

        function hideTeacherDropdown() {
            setTimeout(() => {
                document.getElementById('teacherDropdown').classList.remove('show');
            }, 150);
        }

        function filterTeacherDropdown() {
            const input = document.getElementById('teacherSearch').value.trim().toLowerCase();
            const dd = document.getElementById('teacherDropdown');
            const options = getTeacherOptions();
            const filtered = input ? options.filter(o =>
                o.name.toLowerCase().includes(input) ||
                o.id.includes(input) ||
                o.label.toLowerCase().includes(input)
            ) : options;

            if (filtered.length === 0) {
                dd.innerHTML = '<div class="dd-empty">无匹配师资</div>';
            } else {
                dd.innerHTML = filtered.map(o =>
                    `<div class="dd-item${o.key === selectedTeacherKey ? ' active' : ''}" data-key="${o.key}" onmousedown="selectTeacher('${o.key}')">${o.label}</div>`
                ).join('');
            }
            dd.classList.add('show');
        }

        function selectTeacher(key) {
            selectedTeacherKey = key;
            const t = teacherData[key];
            document.getElementById('teacherSearch').value = `GTH-${t.name}/${t.id}`;
            document.getElementById('teacherDropdown').classList.remove('show');
            render();
        }

        document.getElementById('teacherSearch').addEventListener('blur', hideTeacherDropdown);
        document.getElementById('teacherSearch').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const input = this.value.trim().toLowerCase();
                const options = getTeacherOptions();
                const match = options.find(o =>
                    o.name.toLowerCase().includes(input) ||
                    o.id.includes(input) ||
                    o.label.toLowerCase().includes(input)
                );
                if (match) {
                    selectTeacher(match.key);
                }
                document.getElementById('teacherDropdown').classList.remove('show');
            }
        });

        // Init teacher input
        selectTeacher('zhang');

        /* ====== Search / Filter logic ====== */
        function isLessonMatch(lesson) {
            const sq = activeSearchFilters.student.toLowerCase();
            if (!sq) return true;
            return lesson.studentId.toLowerCase().includes(sq) ||
                   lesson.studentName.toLowerCase().includes(sq);
        }

        function hasActiveFilter() {
            return !!activeSearchFilters.student;
        }

        function applySearch() {
            activeSearchFilters.student = document.getElementById('studentSearch').value.trim();
            updateFilterBar();
            render();
        }

        function resetSearch() {
            document.getElementById('studentSearch').value = '';
            activeSearchFilters = { student: '' };
            updateFilterBar();
            render();
        }

        function removeFilter(type) {
            activeSearchFilters[type] = '';
            if (type === 'student') document.getElementById('studentSearch').value = '';
            updateFilterBar();
            render();
        }

        function updateFilterBar() {
            const bar = document.getElementById('filterBar');
            const container = document.getElementById('activeFilters');
            const countEl = document.getElementById('resultCount');

            if (!hasActiveFilter()) {
                bar.classList.remove('show');
                return;
            }
            bar.classList.add('show');

            let tags = '';
            if (activeSearchFilters.student) {
                tags += `<span class="filter-tag">学员：${activeSearchFilters.student}<span class="tag-close" onclick="removeFilter('student')">&times;</span></span>`;
            }
            container.innerHTML = tags;

            // Count matches
            const teacher = teacherData[selectedTeacherKey];
            const matchCount = teacher.lessons.filter(l => isLessonMatch(l)).length;
            countEl.textContent = `共匹配 ${matchCount} 节课`;

            '15864367008': '2026-10-20',
            '15864367009': '2026-12-15',

        function getExpectedEndDate(studentId) {
            return studentEndDates[studentId] || '—';
        }

        function maskPhone(id) {
            if (!id || id.length < 7) return id;
            return id.slice(0, 3) + '****' + id.slice(-4);
        }

        /* ====== 省心约 rule detection ====== */
        function isSxyRuleMatch(lesson) {
            const teacher = teacherData[selectedTeacherKey];
            if (!teacher.sxyRules) return false;
            return teacher.sxyRules.some(r =>
                r.day === lesson.day &&
                r.start === lesson.start &&
                r.end === lesson.end &&
                r.studentId === lesson.studentId
            );
        }

        function getConflict(lesson) {
            const teacher = teacherData[selectedTeacherKey];
            if (!teacher.sxyRules) return null;
            const conflicts = teacher.sxyRules.filter(r =>
                r.day === lesson.day &&
                r.start === lesson.start &&
                r.end === lesson.end &&
                r.studentId !== lesson.studentId
            );
            return conflicts.length > 0 ? conflicts : null;
        }

        /* ====== Calendar rendering ====== */
        function timeToSlot(t) {
            const [h,m] = t.split(':').map(Number);
            return (h - START_HOUR) * 2 + (m >= 30 ? 1 : 0);
        }

        function slotToTime(slot) {
            const h = START_HOUR + Math.floor(slot / 2);
            const m = (slot % 2 === 0) ? '00' : '30';
            return `${String(h).padStart(2,'0')}:${m}`;
        }

        function render() {
            try { closePanel(); } catch(e) {}
            if (currentView === 'month') renderMonth();
            else if (currentView === 'week') renderWeek();
            else renderDay();
            updateNavLabel();
            if (hasActiveFilter()) updateFilterBar();
        }

        function renderMonth() {
            const teacher = teacherData[selectedTeacherKey];
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const startDow = (firstDay.getDay() + 6) % 7; // 0=Mon
            const totalDays = lastDay.getDate();
            const todayStr = fmtFull(new Date());
            const filtering = hasActiveFilter();

            let html = '<table class="month-cal"><thead><tr>';
            DAYS.forEach(d => { html += `<th>${d}</th>`; });
            html += '</tr></thead><tbody><tr>';

            // Fill leading blanks
            const prevMonth = new Date(currentYear, currentMonth, 0);
            for (let i = 0; i < startDow; i++) {
                const d = prevMonth.getDate() - startDow + 1 + i;
                html += `<td class="other-month"><div class="month-day-num">${d}</div></td>`;
            }

            for (let day = 1; day <= totalDays; day++) {
                const date = new Date(currentYear, currentMonth, day);
                const dateStr = fmtFull(date);
                const dow = (date.getDay() + 6) % 7;
                const isToday = dateStr === todayStr;

                // Get lessons and sxy-pending for this day
                const dayLessons = teacher.lessons.filter(l => l.day === dow);
                const occupiedSlots = dayLessons.map(l => [timeToSlot(l.start), timeToSlot(l.end)]);
                const fixedSegments = teacher.fixed.filter(f => f.day === dow);

                // Count fixed hours
                let fixedMins = 0;
                fixedSegments.forEach(f => {
                    const [sh,sm] = f.start.split(':').map(Number);
                    const [eh,em] = f.end.split(':').map(Number);
                    fixedMins += (eh*60+em) - (sh*60+sm);
                });

                // Pending sxy rules
                const pendingSxy = (teacher.sxyRules || []).filter(r => {
                    if (r.day !== dow) return false;
                    const rs = timeToSlot(r.start), re = timeToSlot(r.end);
                    const isOccupied = occupiedSlots.some(([os, oe]) => rs < oe && re > os);
                    return !isOccupied;
                });

                html += `<td class="${isToday ? 'today' : ''}">`;
                html += `<div class="month-day-num">${day}</div>`;

                // Show lesson dots (max 4)
                const maxShow = 3;
                dayLessons.slice(0, maxShow).forEach(l => {
                    const matched = !filtering || isLessonMatch(l);
                    const opacity = filtering && !matched ? 'opacity:0.2;' : '';
                    html += `<div class="month-dot-row" style="${opacity}" onclick="monthClickLesson(event, '${l.id}', ${dow}, ${day})">`
                         + `<span class="md-dot booked"></span>`
                         + `<span class="md-text">${l.start} ${l.studentName}</span></div>`;
                });

                pendingSxy.slice(0, Math.max(0, maxShow - dayLessons.length)).forEach(r => {
                    html += `<div class="month-dot-row">`
                         + `<span class="md-dot pending"></span>`
                         + `<span class="md-text">${r.start} ${r.studentName} 待约</span></div>`;
                });

                const remaining = dayLessons.length + pendingSxy.length - maxShow;
                if (remaining > 0) {
                    html += `<div class="month-more" onclick="monthClickDay(${day})">+${remaining} 更多</div>`;
                }

                html += '</td>';

                if (dow === 6 && day < totalDays) html += '</tr><tr>';
            }

            // Fill trailing blanks
            const endDow = (lastDay.getDay() + 6) % 7;
            for (let i = endDow + 1; i < 7; i++) {
                html += `<td class="other-month"><div class="month-day-num">${i - endDow}</div></td>`;
            }

            html += '</tr></tbody></table>';
            document.getElementById('monthView').innerHTML = html;
        }

        function monthClickLesson(event, lessonId, dow, day) {
            const teacher = teacherData[selectedTeacherKey];
            const lesson = teacher.lessons.find(l => l.id === lessonId);
            if (!lesson) return;
            // Set currentWeekStart to the correct week so showPanel calculates the right date
            const date = new Date(currentYear, currentMonth, day);
            currentWeekStart = getMonday(date);
            showPanel(lesson, dow, event);
        }

        function monthClickDay(day) {
            const date = new Date(currentYear, currentMonth, day);
            currentWeekStart = getMonday(date);
            currentDayIndex = (date.getDay() + 6) % 7;
            switchView('day');
        }

        function renderWeek() {
            const teacher = teacherData[selectedTeacherKey];
            const cellH = 50;
            const totalSlots = (END_HOUR - START_HOUR) * 2;
            let html = '<table class="cal-table"><thead><tr><th>时间</th>';
            for (let d = 0; d < 7; d++) {
                const date = addDays(currentWeekStart, d);
                const isToday = fmtFull(date) === fmtFull(new Date());
                html += `<th${isToday?' class="today"':''}><span class="th-date">${date.getDate()}</span> <span class="th-day">${DAYS[d]}</span></th>`;
            }
            html += '</tr></thead><tbody>';
            for (let s = 0; s < totalSlots; s++) {
                const h = START_HOUR + Math.floor(s / 2);
                const label = (s % 2 === 0) ? `${String(h).padStart(2,'0')}:00` : '';
                html += `<tr${s%2!==0?' class="half"':''}><td>${label}</td>`;
                for (let d = 0; d < 7; d++) {
                    html += '<td class="day-td" data-day="' + d + '" data-slot="' + s + '"></td>';
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            const container = document.getElementById('weekView');
            container.innerHTML = html;

            const table = container.querySelector('.cal-table');
            const filtering = hasActiveFilter();

            for (let d = 0; d < 7; d++) {
                const firstTd = table.querySelector(`td[data-day="${d}"][data-slot="0"]`);
                if (!firstTd) continue;
                const wrap = document.createElement('div');
                wrap.style.cssText = `position:absolute;top:0;left:0;right:0;height:${totalSlots * cellH}px;pointer-events:none;`;
                firstTd.style.position = 'relative';
                firstTd.style.overflow = 'visible';
                firstTd.appendChild(wrap);

                teacher.fixed.filter(f => f.day === d).forEach(f => {
                    const ss = timeToSlot(f.start), es = timeToSlot(f.end);
                    const bg = document.createElement('div');
                    bg.style.cssText = `position:absolute;top:${ss*cellH}px;height:${(es-ss)*cellH}px;left:0;right:0;background:#f0f7ff;border-left:3px solid #91caff;z-index:0;`;
                    wrap.appendChild(bg);
                });

                teacher.fixed.filter(f => f.day === d).forEach(f => {
                    const ss = timeToSlot(f.start), es = timeToSlot(f.end);
                    const occupiedSlots = teacher.lessons.filter(l => l.day === d).map(l => [timeToSlot(l.start), timeToSlot(l.end)]);
                    for (let slot = ss; slot < es; slot++) {
                        const isOccupied = occupiedSlots.some(([os, oe]) => slot >= os && slot < oe);
                        if (!isOccupied) {
                            const slotTime = slotToTime(slot);
                            const slotEnd = slotToTime(slot + 1);
                            const sxyRule = teacher.sxyRules ? teacher.sxyRules.find(r => r.day === d && r.start === slotTime && r.end === slotEnd) : null;
                            if (sxyRule) {
                                const el = createEntry('sxy-pending', slot, slot + 1, cellH, {
                                    time: slotTime + ' - ' + slotEnd,

                                });

                                tag.className = 'sxy-badge';
                                tag.style.background = '#52c41a';
                                tag.textContent = '省心约';
                                el.appendChild(tag);

                                el.style.cursor = 'pointer';
                                ((r, di) => { el.onclick = (e) => { e.stopPropagation(); showSxyRulePanel(r, di, e); }; })(sxyRule, d);
                                if (filtering) el.classList.add('dimmed');
                                wrap.appendChild(el);
                            } else {
                                let endSlot = slot + 1;
                                while (endSlot < es
                                    && !occupiedSlots.some(([os, oe]) => endSlot >= os && endSlot < oe)
                                    && !(teacher.sxyRules && teacher.sxyRules.find(r => r.day === d && r.start === slotToTime(endSlot) && r.end === slotToTime(endSlot + 1)))
                                ) endSlot++;
                                const el = createEntry('fixed', slot, endSlot, cellH, {
                                    time: slotToTime(slot) + ' - ' + slotToTime(endSlot),
                                    desc: '可被预约时间'
                                });
                                if (filtering) el.classList.add('dimmed');
                                wrap.appendChild(el);
                                slot = endSlot - 1;
                            }
                        }
                    }
                });

                // 省心约待约课：非固定时间段内的
                if (teacher.sxyRules) {
                    const occupiedSlots = teacher.lessons.filter(l => l.day === d).map(l => [timeToSlot(l.start), timeToSlot(l.end)]);
                    const fixedSlots = teacher.fixed.filter(f => f.day === d).map(f => [timeToSlot(f.start), timeToSlot(f.end)]);
                    teacher.sxyRules.filter(r => r.day === d).forEach(r => {
                        const rs = timeToSlot(r.start), re = timeToSlot(r.end);
                        const inFixed = fixedSlots.some(([fs, fe]) => rs >= fs && re <= fe);
                        if (inFixed) return;
                        const isOccupied = occupiedSlots.some(([os, oe]) => rs < oe && re > os);
                        if (isOccupied) return;
                        const el = createEntry('sxy-pending', rs, re, cellH, {
                            time: r.start + ' - ' + r.end,
                            desc: r.studentName + ' ' + maskPhone(r.studentId) + ' 省心约'
                        });
                        const tag = document.createElement('div');
                        tag.className = 'sxy-badge';
                        tag.style.background = '#52c41a';
                        tag.textContent = '省心约';
                        el.appendChild(tag);
                        el.style.pointerEvents = 'auto';
                        el.style.cursor = 'pointer';
                        ((rule, di) => { el.onclick = (e) => { e.stopPropagation(); showSxyRulePanel(rule, di, e); }; })(r, d);
                        if (filtering) el.classList.add('dimmed');
                        wrap.appendChild(el);
                    });
                }

                teacher.lessons.filter(l => l.day === d).forEach(l => {
                    const ss = timeToSlot(l.start), es = timeToSlot(l.end);
                    const el = createEntry(l.type, ss, es, cellH, {
                        time: l.start + ' - ' + l.end,
                        desc: l.className
                    });
                    el.style.pointerEvents = 'auto';
                    if (filtering && !isLessonMatch(l)) {
                        el.classList.add('dimmed');
                    }
                    if (filtering && isLessonMatch(l)) {
                        el.classList.add('highlight-entry');
                    }
                    el.setAttribute('data-lesson-id', l.id);
                    const conflict = getConflict(l);
                    const sxyMatch = isSxyRuleMatch(l);
                    if (conflict) {
                        const badge = document.createElement('div');
                        badge.className = 'conflict-badge';
                        badge.textContent = '!';
                        badge.title = '省心约冲突：' + conflict.map(c => c.studentName).join('、') + ' 的省心约时间';
                        if (sxyMatch) badge.style.right = '28px';
                        el.appendChild(badge);
                    }
                    if (sxyMatch) {
                        const tag = document.createElement('div');
                        tag.className = 'sxy-badge';
                        tag.textContent = '省心约';
                        el.appendChild(tag);
                    }
                    el.onclick = (e) => {
                        e.stopPropagation();
                        showPanel(l, d, e);
                    };
                    wrap.appendChild(el);
                });
            }
        }

            el.style.cssText = `position:absolute;top:${startSlot * cellH}px;height:${(endSlot - startSlot) * cellH - 2}px;left:3px;right:3px;pointer-events:auto;`;
            el.innerHTML = `<div><span class="e-dot"></span><span class="e-time">${data.time}</span></div><div class="e-desc">${data.desc}</div>`;

        function updateNavLabel() {
            const label = document.getElementById('navLabel');
            if (currentView === 'month') {
                label.textContent = `${currentYear}年${currentMonth + 1}月`;
            } else if (currentView === 'week') {
                const end = addDays(currentWeekStart, 6);
                label.textContent = `${fmtShort(currentWeekStart)}-${fmtShort(end)}`;
            } else {
                const date = addDays(currentWeekStart, currentDayIndex);
                label.textContent = `${fmtFull(date)} ${DAYS[currentDayIndex]}`;
            }
        }

        function navPrev() {
            if (currentView === 'month') {
                currentMonth--;
                if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            } else if (currentView === 'week') {
                currentWeekStart = addDays(currentWeekStart, -7);
            } else {
                if (currentDayIndex === 0) { currentWeekStart = addDays(currentWeekStart, -7); currentDayIndex = 6; }
                else currentDayIndex--;
            }
            render();
        }

        function navNext() {
            if (currentView === 'month') {
                currentMonth++;
                if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            } else if (currentView === 'week') {
                currentWeekStart = addDays(currentWeekStart, 7);
            } else {
                if (currentDayIndex === 6) { currentWeekStart = addDays(currentWeekStart, 7); currentDayIndex = 0; }
                else currentDayIndex++;
            }
            render();
        }

        function goToday() {
            currentWeekStart = getMonday(new Date());
            currentDayIndex = (new Date().getDay() + 6) % 7;
            currentMonth = new Date().getMonth();
            currentYear = new Date().getFullYear();
            render();
        }

        function switchView(v) {
            currentView = v;
            document.getElementById('btnMonth').classList.toggle('active', v==='month');
            document.getElementById('btnWeek').classList.toggle('active', v==='week');
            document.getElementById('btnDay').classList.toggle('active', v==='day');
            document.getElementById('monthView').classList.toggle('hidden', v!=='month');
            document.getElementById('weekView').classList.toggle('hidden', v!=='week');
            document.getElementById('dayView').classList.toggle('hidden', v!=='day');
            render();
        }

        function showSxyRulePanel(rule, dayIndex, event) {
            const pop = document.getElementById('popover');
            const date = addDays(currentWeekStart, dayIndex);
            document.getElementById('popInner').innerHTML = `
                <div class="pop-header" style="background:#52c41a">
                    <div class="pop-close" onclick="closePanel()">&times;</div>
                    <div class="pop-status">省心约规则 · 待约课</div>
                    <div class="pop-time">${fmtFull(date)}（${DAYS[dayIndex]}）${rule.start}-${rule.end}</div>
                </div>
                <div class="pop-body">
                    <div class="pop-row"><div class="pop-label">主讲老师</div><div class="pop-value">GTH-${teacherData[selectedTeacherKey].name}</div></div>
                    <div class="pop-row"><div class="pop-label">学员名称</div><div class="pop-value">${rule.studentName}</div></div>
                    <div class="pop-row"><div class="pop-label">学员ID</div><div class="pop-value">${rule.studentId}</div></div>
                    <div class="pop-row"><div class="pop-label">手机号</div><div class="pop-value">${maskPhone(rule.studentId)}</div></div>
                    <div class="pop-row"><div class="pop-label">规则时段</div><div class="pop-value">每${DAYS[rule.day]} ${rule.start}-${rule.end}</div></div>
                    <div class="pop-row"><div class="pop-label">预计结课</div><div class="pop-value">${getExpectedEndDate(rule.studentId)}</div></div>
                    <div class="pop-row"><div class="pop-label">当前状态</div><div class="pop-value" style="color:#52c41a;font-weight:600">待约课</div></div>
                </div>
            `;
            const rect = event.currentTarget.getBoundingClientRect();
            pop.classList.add('show');
            const popW = pop.offsetWidth;
            const popH = pop.offsetHeight;
            let left = rect.right + 8;
            let top = rect.top;
            if (left + popW > window.innerWidth - 10) left = rect.left - popW - 8;
            if (left < 10) left = Math.max(10, (window.innerWidth - popW) / 2);
            if (top + popH > window.innerHeight - 10) top = window.innerHeight - popH - 10;
            if (top < 10) top = 10;
            pop.style.left = left + 'px';
            pop.style.top = top + 'px';
        }

        function showPanel(lesson, dayIndex, event) {
            const pop = document.getElementById('popover');
            const date = addDays(currentWeekStart, dayIndex);
            const headerClass = 'sxy';
            const conflict = getConflict(lesson);
            let conflictHtml = '';
            if (conflict) {
                const names = conflict.map(c => `${c.studentName}（${c.studentId}）`).join('、');
                conflictHtml = `
                <div class="pop-conflict">
                    <div class="pop-conflict-title">&#9888; 省心约时间冲突</div>
                    <div class="pop-conflict-text">该时段为 ${names} 的省心约固定时间，当前被其他学员占用</div>
                </div>`;
            }
            document.getElementById('popInner').innerHTML = `
                <div class="pop-header ${headerClass}">
                    <div class="pop-close" onclick="closePanel()">&times;</div>
                    <div class="pop-status">${lesson.status || '未开课'}</div>
                    <div class="pop-time">${fmtFull(date)}（${DAYS[dayIndex]}）${lesson.start}-${lesson.end}</div>
                </div>${conflictHtml}
                <div class="pop-body">
                    <div class="pop-row"><div class="pop-label">主讲老师</div><div class="pop-value">GTH-${teacherData[selectedTeacherKey].name}</div></div>
                    <div class="pop-row"><div class="pop-label">学员名称</div><div class="pop-value">${lesson.studentName}</div></div>
                    <div class="pop-row"><div class="pop-label">学员ID</div><div class="pop-value">${lesson.studentId}</div></div>
                    <div class="pop-row"><div class="pop-label">手机号</div><div class="pop-value">${maskPhone(lesson.studentId)}</div></div>
                    <div class="pop-row"><div class="pop-label">二讲老师</div><div class="pop-value">${lesson.tutor}（${lesson.tutorId}）</div></div>
                    <div class="pop-row"><div class="pop-label">课节名称</div><div class="pop-value">${lesson.className}</div></div>
                    <div class="pop-row"><div class="pop-label">课节ID</div><div class="pop-value">${lesson.id}</div></div>
                    <div class="pop-row"><div class="pop-label">班级ID</div><div class="pop-value">${lesson.classId}</div></div>

                    <div class="pop-row"><div class="pop-label">省心约规则</div><div class="pop-value">${isSxyRuleMatch(lesson) ? '是' : '否'}</div></div>
                    <div class="pop-row"><div class="pop-label">预计结课</div><div class="pop-value">${getExpectedEndDate(lesson.studentId)}</div></div>
                </div>
            `;
            const rect = event.currentTarget.getBoundingClientRect();
            pop.classList.add('show');
            const popW = pop.offsetWidth;
            const popH = pop.offsetHeight;
            let left = rect.right + 8;
            let top = rect.top;
            if (left + popW > window.innerWidth - 10) left = rect.left - popW - 8;
            if (left < 10) left = Math.max(10, (window.innerWidth - popW) / 2);
            if (top + popH > window.innerHeight - 10) top = window.innerHeight - popH - 10;
            if (top < 10) top = 10;
            pop.style.left = left + 'px';
            pop.style.top = top + 'px';
        }

        function closePanel() {
            document.getElementById('popover').classList.remove('show');
        }

        document.addEventListener('click', function(e) {
            const pop = document.getElementById('popover');
            if (!pop.classList.contains('show')) return;
            if (pop.contains(e.target)) return;
            if (e.target.closest('.entry') || e.target.closest('.day-entry')) return;
            closePanel();
        });

        render();
    </script>
</body>
</html>
