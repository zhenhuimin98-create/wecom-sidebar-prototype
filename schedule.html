<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主讲老师课表查看</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background: #f5f6fa;
  color: #1a1a1a;
  font-size: 14px;
  min-height: 100vh;
}

/* 顶部 */
.top-bar {
  background: #fff;
  padding: 14px 20px;
  border-bottom: 1px solid #e8e8e8;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.top-bar-title {
  font-size: 16px;
  font-weight: 700;
  color: #1a1a1a;
  margin-right: 16px;
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: #666;
}
.filter-group select, .filter-group input {
  border: 1px solid #d9d9d9;
  border-radius: 4px;
  padding: 5px 10px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  background: #fff;
  color: #333;
}
.filter-group select:focus, .filter-group input:focus { border-color: #1677ff; }

/* 导航栏 */
.nav-row {
  background: #fff;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #e8e8e8;
  flex-wrap: wrap;
}
.view-tabs {
  display: flex;
  border: 1px solid #d9d9d9;
  border-radius: 4px;
  overflow: hidden;
}
.v-tab {
  padding: 4px 14px;
  font-size: 13px;
  border: none;
  background: #fff;
  cursor: pointer;
  font-family: inherit;
  color: #666;
  border-right: 1px solid #d9d9d9;
}
.v-tab:last-child { border-right: none; }
.v-tab.active { background: #1677ff; color: #fff; }
.v-tab:hover:not(.active) { background: #f5f5f5; }

.nav-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.nav-btn {
  width: 28px; height: 28px;
  border: 1px solid #d9d9d9;
  border-radius: 4px;
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: #666;
  font-size: 14px;
}
.nav-btn:hover { border-color: #1677ff; color: #1677ff; }
.nav-date {
  font-size: 13px;
  color: #333;
  padding: 4px 10px;
  border: 1px solid #d9d9d9;
  border-radius: 4px;
  background: #fff;
  min-width: 140px;
  text-align: center;
}
.today-btn {
  padding: 4px 12px;
  border: 1px solid #d9d9d9;
  border-radius: 4px;
  background: #fff;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  color: #333;
}
.today-btn:hover { border-color: #1677ff; color: #1677ff; }

/* 图例 */
.legend-row {
  background: #fff;
  padding: 8px 20px;
  display: flex;
  gap: 20px;
  border-bottom: 1px solid #e8e8e8;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  color: #666;
}
.leg-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.leg-dot.blue { background: #1677ff; }
.leg-dot.red { background: #ff4d4f; }
.leg-dot.green { background: #52c41a; }
.leg-dot.orange { background: #fa8c16; }
.leg-dot.gray { background: #d9d9d9; }

/* ── 课表 ── */
.schedule-container {
  display: flex;
  position: relative;
}
.schedule-main {
  flex: 1;
  overflow-x: auto;
  padding: 0;
}

/* 周视图表格 */
.cal-table {
  width: 100%;
  min-width: 860px;
  border-collapse: collapse;
  background: #fff;
  table-layout: fixed;
}
.cal-table th {
  padding: 12px 4px;
  text-align: center;
  font-weight: 600;
  font-size: 15px;
  color: #333;
  border-bottom: 2px solid #e8e8e8;
  border-right: 1px solid #f0f0f0;
  background: #fff;
  position: sticky;
  top: 0;
  z-index: 3;
}
.cal-table th:first-child {
  width: 56px;
  font-size: 12px;
  color: #999;
  font-weight: 400;
}
.cal-table th .th-date {
  font-size: 18px;
  font-weight: 700;
  color: #333;
}
.cal-table th .th-day {
  font-size: 12px;
  color: #999;
  font-weight: 400;
}
.cal-table th.today .th-date { color: #1677ff; }
.cal-table th.today .th-day { color: #1677ff; }

.cal-table td {
  border-right: 1px solid #f0f0f0;
  border-bottom: 1px solid #f0f0f0;
  height: 50px;
  padding: 0;
  vertical-align: top;
  position: relative;
}
.cal-table td:first-child {
  width: 56px;
  font-size: 12px;
  color: #bbb;
  text-align: right;
  padding-right: 8px;
  padding-top: 0;
  vertical-align: top;
  line-height: 1;
  border-right: 1px solid #e8e8e8;
}
.cal-table tr.half td { border-bottom: 1px dashed #f5f5f5; }

/* 日期列 wrapper */
.col-wrap {
  position: relative;
  width: 100%;
  height: 100%;
}

/* 课节条目 */
.entry {
  position: absolute;
  left: 3px; right: 3px;
  border-radius: 3px;
  padding: 3px 6px;
  font-size: 11px;
  line-height: 1.4;
  cursor: pointer;
  overflow: hidden;
  z-index: 2;
  transition: box-shadow 0.15s;
}
.entry:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.12); z-index: 5; }
.entry .e-dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-right: 3px;
  vertical-align: middle;
  position: relative;
  top: -1px;
}
.entry .e-time { font-weight: 500; color: #333; }
.entry .e-desc { color: #999; font-size: 10px; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* 固定时间（可被预约） */
.entry.fixed { background: #f0f7ff; }
.entry.fixed .e-dot { background: #1677ff; }
.entry.fixed .e-time { color: #1677ff; }
.entry.fixed .e-desc { color: #69b1ff; }

/* 省心约 - 未开课 */
.entry.sxy { background: #fff1f0; }
.entry.sxy .e-dot { background: #ff4d4f; }
.entry.sxy .e-time { color: #cf1322; }
.entry.sxy .e-desc { color: #ff7875; }

/* OES */
.entry.oes { background: #fff7e6; }
.entry.oes .e-dot { background: #fa8c16; }
.entry.oes .e-time { color: #d46b08; }
.entry.oes .e-desc { color: #ffc069; }

/* ── 右侧详情面板 ── */
.detail-panel {
  width: 0;
  overflow: hidden;
  background: #fff;
  border-left: 1px solid #e8e8e8;
  transition: width 0.25s ease;
  flex-shrink: 0;
}
.detail-panel.open { width: 360px; }
.dp-inner {
  width: 360px;
  height: 100%;
  overflow-y: auto;
}
.dp-header {
  padding: 20px;
  position: relative;
}
.dp-header.sxy { background: #ff4d4f; }
.dp-header.oes { background: #fa8c16; }
.dp-header.fixed { background: #1677ff; }
.dp-close {
  position: absolute;
  top: 12px; right: 12px;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: rgba(255,255,255,0.7);
  font-size: 18px;
}
.dp-close:hover { color: #fff; }
.dp-status { font-size: 16px; font-weight: 700; color: #fff; }
.dp-time { font-size: 13px; color: rgba(255,255,255,0.85); margin-top: 4px; }

.dp-body { padding: 16px 20px; }
.dp-row {
  display: flex;
  padding: 8px 0;
  border-bottom: 1px solid #f5f5f5;
  font-size: 13px;
}
.dp-row:last-child { border-bottom: none; }
.dp-label { color: #999; width: 76px; flex-shrink: 0; }
.dp-value { color: #1a1a1a; font-weight: 500; word-break: break-all; }

/* 日视图 */
.day-cal-table {
  width: 100%;
  max-width: 600px;
  margin: 0 auto;
  border-collapse: collapse;
  background: #fff;
  table-layout: fixed;
}
.day-cal-table td {
  border-right: 1px solid #f0f0f0;
  border-bottom: 1px solid #f0f0f0;
  height: 60px;
  padding: 0;
  vertical-align: top;
  position: relative;
}
.day-cal-table td:first-child {
  width: 56px;
  font-size: 12px;
  color: #bbb;
  text-align: right;
  padding-right: 8px;
  vertical-align: top;
  line-height: 1;
  border-right: 1px solid #e8e8e8;
}
.day-cal-table tr.half td { border-bottom: 1px dashed #f5f5f5; }
.day-entry {
  position: absolute;
  left: 4px; right: 4px;
  border-radius: 4px;
  padding: 6px 10px;
  font-size: 12px;
  line-height: 1.5;
  cursor: pointer;
  z-index: 2;
  transition: box-shadow 0.15s;
}
.day-entry:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); z-index: 5; }
.day-entry.fixed { background: #f0f7ff; border-left: 3px solid #1677ff; }
.day-entry.sxy { background: #fff1f0; border-left: 3px solid #ff4d4f; }
.day-entry.oes { background: #fff7e6; border-left: 3px solid #fa8c16; }
.day-entry .de-name { font-weight: 700; font-size: 13px; color: #333; }
.day-entry .de-time { font-size: 11px; color: #999; }
.day-entry .de-info { font-size: 11px; color: #999; margin-top: 2px; }

.hidden { display: none; }
</style>
</head>

// ── 工具 ──
function timeToSlot(t) {
  const [h,m] = t.split(':').map(Number);
  return (h - START_HOUR) * 2 + (m >= 30 ? 1 : 0);
}

function render() {
  closePanel();
  if (currentView === 'week') renderWeek();
  else renderDay();
  updateNavLabel();
}

function renderWeek() {
  const teacher = teacherData[document.getElementById('teacherSelect').value];
  const cellH = 50;
  const totalSlots = (END_HOUR - START_HOUR) * 2;

  let html = '<table class="cal-table"><thead><tr><th>时间</th>';
  for (let d = 0; d < 7; d++) {
    const date = addDays(currentWeekStart, d);
    const isToday = fmtFull(date) === fmtFull(new Date());
    html += `<th${isToday?' class="today"':''}><span class="th-date">${date.getDate()}</span> <span class="th-day">${DAYS[d]}</span></th>`;
  }
  html += '</tr></thead><tbody>';

  for (let s = 0; s < totalSlots; s++) {
    const h = START_HOUR + Math.floor(s / 2);
    const label = (s % 2 === 0) ? `${String(h).padStart(2,'0')}:00` : '';
    html += `<tr${s%2!==0?' class="half"':''}><td>${label}</td>`;
    for (let d = 0; d < 7; d++) {
      html += '<td class="day-td" data-day="' + d + '" data-slot="' + s + '"></td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table>';

  const container = document.getElementById('weekView');
  container.innerHTML = html;

  // 用 JS 后插入每列的 wrapper + 课节
  // 找到每天第一行的 td 来获取位置
  const table = container.querySelector('.cal-table');

  for (let d = 0; d < 7; d++) {
    const firstTd = table.querySelector(`td[data-day="${d}"][data-slot="0"]`);
    if (!firstTd) continue;

    // 创建 wrapper 放在 firstTd 内，跨越整个列高
    const wrap = document.createElement('div');
    wrap.style.cssText = `position:absolute;top:0;left:0;right:0;height:${totalSlots * cellH}px;pointer-events:none;`;
    firstTd.style.position = 'relative';
    firstTd.style.overflow = 'visible';
    firstTd.appendChild(wrap);

    // 固定时间段
    teacher.fixed.filter(f => f.day === d).forEach(f => {
      const ss = timeToSlot(f.start), es = timeToSlot(f.end);
      // 把固定时间段拆分成空闲段（不含已排课的部分）
      const occupiedSlots = teacher.lessons.filter(l => l.day === d).map(l => [timeToSlot(l.start), timeToSlot(l.end)]);
      // 遍历固定时间段内每个半小时
      for (let slot = ss; slot < es; slot++) {
        const isOccupied = occupiedSlots.some(([os, oe]) => slot >= os && slot < oe);
        if (!isOccupied) {
          // 合并连续空闲slot
          let endSlot = slot + 1;
          while (endSlot < es && !occupiedSlots.some(([os, oe]) => endSlot >= os && endSlot < oe)) {
            endSlot++;
          }
          const el = createEntry('fixed', slot, endSlot, cellH, {
            time: slotToTime(slot) + ' - ' + slotToTime(endSlot),
            desc: '可被预约时间'
          });
          wrap.appendChild(el);
          slot = endSlot - 1;
        }
      }
    });

    // 课节
    teacher.lessons.filter(l => l.day === d).forEach(l => {
      const ss = timeToSlot(l.start), es = timeToSlot(l.end);
      const el = createEntry(l.type, ss, es, cellH, {
        time: l.start + ' - ' + l.end,
        desc: l.className
      });
      el.style.pointerEvents = 'auto';
      el.onclick = () => showPanel(l, d);
      wrap.appendChild(el);
    });
  }
}

function createEntry(type, startSlot, endSlot, cellH, data) {
  const el = document.createElement('div');
  el.className = `entry ${type}`;
  el.style.cssText = `position:absolute;top:${startSlot * cellH}px;height:${(endSlot - startSlot) * cellH - 2}px;left:3px;right:3px;pointer-events:auto;`;
  el.innerHTML = `<div><span class="e-dot"></span><span class="e-time">${data.time}</span></div><div class="e-desc">${data.desc}</div>`;
  return el;
}

function slotToTime(slot) {
  const h = START_HOUR + Math.floor(slot / 2);
  const m = (slot % 2 === 0) ? '00' : '30';
  return `${String(h).padStart(2,'0')}:${m}`;
}

function renderDay() {
  const teacher = teacherData[document.getElementById('teacherSelect').value];
  const cellH = 60;
  const totalSlots = (END_HOUR - START_HOUR) * 2;
  const d = currentDayIndex;

  let html = '<table class="day-cal-table"><tbody>';
  for (let s = 0; s < totalSlots; s++) {
    const h = START_HOUR + Math.floor(s / 2);
    const label = (s % 2 === 0) ? `${String(h).padStart(2,'0')}:00` : '';
    html += `<tr${s%2!==0?' class="half"':''}><td>${label}</td><td data-slot="${s}"></td></tr>`;
  }
  html += '</tbody></table>';

  const container = document.getElementById('dayView');
  container.innerHTML = html;

  const firstTd = container.querySelector('td[data-slot="0"]:last-child');
  if (!firstTd) return;
  const wrap = document.createElement('div');
  wrap.style.cssText = `position:absolute;top:0;left:0;right:0;height:${totalSlots * cellH}px;`;
  firstTd.style.position = 'relative';
  firstTd.style.overflow = 'visible';
  firstTd.appendChild(wrap);

  // 固定时间
  const occupiedSlots = teacher.lessons.filter(l => l.day === d).map(l => [timeToSlot(l.start), timeToSlot(l.end)]);
  teacher.fixed.filter(f => f.day === d).forEach(f => {
    const ss = timeToSlot(f.start), es = timeToSlot(f.end);
    for (let slot = ss; slot < es; slot++) {
      const isOccupied = occupiedSlots.some(([os, oe]) => slot >= os && slot < oe);
      if (!isOccupied) {
        let endSlot = slot + 1;
        while (endSlot < es && !occupiedSlots.some(([os, oe]) => endSlot >= os && endSlot < oe)) endSlot++;
        const el = document.createElement('div');
        el.className = 'day-entry fixed';
        el.style.cssText = `position:absolute;top:${slot*cellH}px;height:${(endSlot-slot)*cellH-2}px;left:4px;right:4px;display:flex;align-items:center;`;
        el.innerHTML = `<div><div class="de-time">${slotToTime(slot)} - ${slotToTime(endSlot)}</div><div class="de-info">可被预约时间</div></div>`;
        wrap.appendChild(el);
        slot = endSlot - 1;
      }
    }
  });

  // 课节
  teacher.lessons.filter(l => l.day === d).forEach(l => {
    const ss = timeToSlot(l.start), es = timeToSlot(l.end);
    const el = document.createElement('div');
    el.className = `day-entry ${l.type}`;
    el.style.cssText = `position:absolute;top:${ss*cellH}px;height:${(es-ss)*cellH-2}px;left:4px;right:4px;`;
    el.innerHTML = `<div class="de-name">${l.studentName}</div><div class="de-time">${l.start} - ${l.end} | ${l.type==='oes'?'OES':'省心约'}</div><div class="de-info">${l.className} | ${l.tutor}</div>`;
    el.onclick = () => showPanel(l, d);
    wrap.appendChild(el);
  });
}

function updateNavLabel() {
  const label = document.getElementById('navLabel');
  if (currentView === 'week') {
    const end = addDays(currentWeekStart, 6);
    label.textContent = `${fmtShort(currentWeekStart)}-${fmtShort(end)}`;
  } else {
    const date = addDays(currentWeekStart, currentDayIndex);
    label.textContent = `${fmtFull(date)} ${DAYS[currentDayIndex]}`;
  }
}

function navPrev() {
  if (currentView === 'week') currentWeekStart = addDays(currentWeekStart, -7);
  else { if (currentDayIndex === 0) { currentWeekStart = addDays(currentWeekStart, -7); currentDayIndex = 6; } else currentDayIndex--; }
  render();
}
function navNext() {
  if (currentView === 'week') currentWeekStart = addDays(currentWeekStart, 7);
  else { if (currentDayIndex === 6) { currentWeekStart = addDays(currentWeekStart, 7); currentDayIndex = 0; } else currentDayIndex++; }
  render();
}
function goToday() {
  currentWeekStart = getMonday(new Date());
  currentDayIndex = (new Date().getDay() + 6) % 7;
  render();
}
function switchView(v) {
  currentView = v;
  document.getElementById('btnWeek').classList.toggle('active', v==='week');
  document.getElementById('btnDay').classList.toggle('active', v==='day');
  document.getElementById('weekView').classList.toggle('hidden', v!=='week');
  document.getElementById('dayView').classList.toggle('hidden', v!=='day');
  render();
}

function showPanel(lesson, dayIndex) {
  const panel = document.getElementById('detailPanel');
  const date = addDays(currentWeekStart, dayIndex);
  const typeLabel = lesson.type === 'oes' ? 'OES强制约课' : '省心约规则';
  const headerClass = lesson.type === 'oes' ? 'oes' : 'sxy';

  document.getElementById('dpInner').innerHTML = `
    <div class="dp-header ${headerClass}">
      <div class="dp-close" onclick="closePanel()">&times;</div>
      <div class="dp-status">${lesson.status || '未开课'}</div>
      <div class="dp-time">${fmtFull(date)}（${DAYS[dayIndex]}）${lesson.start}-${lesson.end}</div>
    </div>
    <div class="dp-body">
      <div class="dp-row"><div class="dp-label">主讲老师</div><div class="dp-value">GTH-${teacherData[document.getElementById('teacherSelect').value].name}</div></div>
      <div class="dp-row"><div class="dp-label">学员名称</div><div class="dp-value">${lesson.studentName}</div></div>
      <div class="dp-row"><div class="dp-label">学员ID</div><div class="dp-value">${lesson.studentId}</div></div>
      <div class="dp-row"><div class="dp-label">二讲老师</div><div class="dp-value">${lesson.tutor}（${lesson.tutorId}）</div></div>
      <div class="dp-row"><div class="dp-label">课程类型</div><div class="dp-value">${lesson.courseType}</div></div>
      <div class="dp-row"><div class="dp-label">课节名称</div><div class="dp-value">${lesson.className}</div></div>
      <div class="dp-row"><div class="dp-label">课节ID</div><div class="dp-value">${lesson.id}</div></div>
      <div class="dp-row"><div class="dp-label">班级ID</div><div class="dp-value">${lesson.classId}</div></div>
      <div class="dp-row"><div class="dp-label">来源系统</div><div class="dp-value">${typeLabel}</div></div>
      <div class="dp-row"><div class="dp-label">课节类型</div><div class="dp-value">直播课，正式课节</div></div>
    </div>
  `;
  panel.classList.add('open');
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
}

render();
